# ── Docker Publish ─────────────────────────────────────────────────────────────
#
# Builds a multi-platform Docker image and pushes it to the GitHub Container
# Registry (ghcr.io) on every push to main and on every version tag.
#
# Image tags produced:
#   ghcr.io/<owner>/<repo>:latest        – always points to the latest main build
#   ghcr.io/<owner>/<repo>:main          – same as above, branch-named
#   ghcr.io/<owner>/<repo>:1.2.3         – semantic version (from tag v1.2.3)
#   ghcr.io/<owner>/<repo>:1.2           – major.minor shorthand
#
# To publish a release, push a tag: git tag v1.0.0 && git push --tags

name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Auth ──────────────────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata ──────────────────────────────────────────────────────────────
      # Derives image tags and labels from the branch name or semver tag.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── Buildx ────────────────────────────────────────────────────────────────
      # Required for multi-platform builds (amd64 + arm64).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build and push ────────────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache speeds up repeated builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max
